<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Agregar Aviso</title>
        <link rel="stylesheet" href="../css/styles.css">
        <script src="../js/agregar.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Agregar Aviso de Adopción</h1>
        </header>
        <main>
            <form id="form-aviso" novalidate>
                <fieldset> <!--Donde-->
                    <legend>¿Dónde?</legend>
                    <label for="region">Región:</label>
                    <select id="region" name="region" required></select>

                    <label for="comuna">Comuna:</label>
                    <select id="comuna" name="comuna" required>
                        <option value="">Seleccione comuna</option>
                    </select>

                    <label for="sector">Sector:</label>
                    <input type="text" id="sector" name="sector" maxlength="100" required>
                </fieldset>

                <fieldset> <!--Contacto-->
                    <legend>¿Contacto de esta publicación?</legend>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" minlength="3" maxlength="200" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" maxlength="100" required>

                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" pattern="^\+569\d{8}$"
                           placeholder="+569XXXXXXXX" required>
                    
                    <label for="contacto-por">Contactar por:</label>
                    <select id="contacto-por" name="contactoPor" required>
                        <option value="">Seleccione medio de contactos</option>
                        <option value="whatsapp">Whatsapp</option>
                        <option value="telegram">Telegram</option>
                        <option value="x">X</option>
                        <option value="instagram">Instagram</option>
                        <option value="tiktok">TikTok</option>
                        <option value="otra">Otra</option>
                    </select>

                    <div id="contacto-id-container" class="hidden">
                        <label for="contacto-id">ID o URL de contacto</label>
                        <input type="text" id="contacto-id" name="contactoID" minlength="4" maxlength="50">
                    </div>
                </fieldset>

                <fieldset> <!--Qué mascota ofrece en adopcion-->
                    <legend>¿Qué mascota ofrece en adopción?</legend>
                    <label for="tipo">Tipo:</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Seleccione tipo de mascota</option>
                        <option value="perro">Perro</option>
                        <option value="gato">Gato</option>
                    </select>

                    <label for="cantidad">Cantidad:</label>
                    <input type="number" id="cantidad" name="cantidad" min="1" required>

                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" min="1" required>

                    <label for="unidad-edad">Unidad medida edad</label>
                    <select id="unidad-edad" name="unidadEdad" required>
                        <option value="">Seleccione la unidad</option>
                        <option value="meses">Meses</option>
                        <option value="años">Años</option>
                    </select>

                    <label for="fecha-disponible">Fecha disponible para entrega:</label>
                    <input type="datetime-local" id="fecha-disponible" name="fechaDisponible" required>

                    <label for="descripcion">Descripcion</label>
                    <textarea id="descripcion" name="descripcion" cols="50" rows="10"></textarea>

                    <label>Fotos</label>
                    <div id="fotos-container">
                        <input type="file" name="fotos" accept="image/*" required>
                    </div>
                    <button type="button" id="ad-foto">Añadir foto</button>
                </fieldset>

                <input type="submit" value="Agregar este aviso de adopción">
            </form>

            <div id="confirm-dialog" class="hidden">
                <p>¿Está seguro que desea agregar este aviso de adopción?</p>
                <button id="confirmar-si">Sí, estoy seguro</button>
                <button id="confirmar-no">No, no estoy seguro, quiero volver al formulario</button>
            </div>

            <div id="mensaje-exito" class="hidden">
                <p>Hemos recibido la información de adopción, muchas gracias y suerte!</p>
                <button onclick="location.href='index.html'">Volver a la portada</button>
            </div>
        </main>
    </body>
</html>
