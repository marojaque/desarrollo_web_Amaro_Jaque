<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Estadística de Adopciones</title>
        <link rel="stylesheet" href="../css/styles.css">
    </head>

    <body>
        <header>
            <h1>Estadística</h1>
        </header>

        <main>
            <section class="grafico">
                <h2>Cantidad de avisos de adopción por día</h2>
                <img src="../imagenes/adopciones_por_dia.png"
                     alt="Avisos por día"
                     width="600" height="400">
            </section>

            <section class="grafico">
                <h2>Total de avisos por tipo mascota</h2>
                <img src="../imagenes/total-de-adopciones.png"
                     alt="Gráfico de torta mostrando el total de avisos por tipo de mascota"
                     width="600" height="400">
            </section>

            <section class="grafico">
                <h2>Avisos por mes y por tipo de mascota</h2>
                <img src="../imagenes/total_adopciones_por_mes.png"
                     alt="Gráfico de barras que muestra las adopciones por mes y tipo de mascota"
                     width="600" height="400">
            </section>

            <section id="volver-portada">
                <a href="index.html" class="volver-boton">Volver a la portada</a>
            </section>
        </main>
    </body>
</html>
